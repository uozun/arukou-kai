<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日の丸歩こう会 - デモ</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hiragino Sans', sans-serif; background: #000; color: white; height: 100dvh; overflow: hidden; }
  #cesiumContainer { width: 100%; height: 100dvh; position: fixed; top: 0; left: 0; }
  .cesium-widget-credits, .cesium-viewer-toolbar, .cesium-viewer-animationContainer, .cesium-viewer-timelineContainer, .cesium-viewer-bottom { display: none !important; }

  #header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent); display: flex; align-items: center; gap: 10px; }
  .hinomaru { width: 32px; height: 32px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hinomaru-circle { width: 18px; height: 18px; background: #C1272D; border-radius: 50%; }
  #header h1 { font-size: 16px; font-weight: 700; }
  #header p { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 1px; }

  #status-bar { position: fixed; top: 68px; left: 12px; right: 12px; z-index: 100; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); border-radius: 12px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
  .stat { text-align: center; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 1px; }
  .stat-divider { width: 1px; height: 30px; background: rgba(255,255,255,0.15); }

  #permission-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; }
  #permission-overlay .icon { font-size: 64px; margin-bottom: 20px; }
  #permission-overlay h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  #permission-overlay p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 32px; }
  #start-btn { background: #C1272D; color: white; border: none; border-radius: 50px; padding: 16px 40px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; max-width: 300px; }

  #step-indicator { position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%); z-index: 100; width: 60px; height: 60px; border-radius: 50%; background: rgba(193,39,45,0.3); border: 2px solid rgba(193,39,45,0.5); display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
  #step-indicator.active { background: rgba(193,39,45,0.9); border-color: #C1272D; transform: translateX(-50%) scale(1.2); }

  #walk-guide { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; pointer-events: none; }
  #walk-guide .guide-icon { font-size: 36px; animation: bounce 1s ease-in-out infinite; }
  #walk-guide p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  #direction-controls { position: fixed; bottom: 20px; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; gap: 12px; }
  .dir-btn { background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 50%; width: 52px; height: 52px; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .dir-btn:active { background: rgba(193,39,45,0.8); }

  #poi-notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 150; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); border: 1px solid rgba(193,39,45,0.5); border-radius: 20px; padding: 24px; text-align: center; width: 280px; display: none; }
  #poi-notification .poi-icon { font-size: 48px; margin-bottom: 12px; }
  #poi-notification h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  #poi-notification p { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
  #poi-notification button { background: #C1272D; color: white; border: none; border-radius: 50px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }

  #goal-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
  #goal-overlay .badge { width: 120px; height: 120px; background: radial-gradient(circle, #FFD700, #B8902A); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 60px; margin-bottom: 24px; animation: badge-appear 0.5s cubic-bezier(0.175,0.885,0.32,1.275); box-shadow: 0 0 40px rgba(255,215,0,0.5); }
  @keyframes badge-appear { from{transform:scale(0) rotate(-180deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  #goal-overlay h2 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
  #goal-overlay .governor-msg { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin: 20px 0; font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.85); }
  #goal-overlay button { background: #C1272D; color: white; border: none; border-radius: 50px; padding: 14px 36px; font-size: 16px; font-weight: 700; cursor: pointer; }

  #loading-overlay { position: fixed; inset: 0; z-index: 250; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .loading-hinomaru { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 1.5s ease-in-out infinite; }
  .loading-hinomaru-circle { width: 46px; height: 46px; background: #C1272D; border-radius: 50%; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  #loading-overlay p { color: rgba(255,255,255,0.6); font-size: 14px; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-hinomaru"><div class="loading-hinomaru-circle"></div></div>
  <p id="loading-text">新宿の街を読み込み中...</p>
</div>

<div id="cesiumContainer"></div>

<div id="permission-overlay">
  <div class="icon">🚶</div>
  <h2>日の丸歩こう会</h2>
  <p>スマホを持って実際に歩くと、<br>3D都市の中を移動できます。<br><br>加速度センサーの使用を許可してください。</p>
  <button id="start-btn" onclick="requestPermission()">はじめる</button>
</div>

<div id="header">
  <div class="hinomaru"><div class="hinomaru-circle"></div></div>
  <div><h1>日の丸歩こう会</h1><p>第1回 新宿コース</p></div>
</div>

<div id="status-bar">
  <div class="stat"><div class="stat-value" id="step-count">0</div><div class="stat-label">歩数</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value" id="distance">0m</div><div class="stat-label">距離</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value" id="participants">🟢 12</div><div class="stat-label">参加中</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value" id="progress-text">0%</div><div class="stat-label">進捗</div></div>
</div>

<div id="step-indicator"><span>👟</span></div>

<div id="walk-guide">
  <div class="guide-icon">🚶</div>
  <p>歩いて街を進もう</p>
</div>

<div id="direction-controls">
  <button class="dir-btn" ontouchstart="startTurn('left')" ontouchend="stopTurn()" onmousedown="startTurn('left')" onmouseup="stopTurn()">◀</button>
  <button class="dir-btn" ontouchstart="startTurn('right')" ontouchend="stopTurn()" onmousedown="startTurn('right')" onmouseup="stopTurn()">▶</button>
</div>

<div id="poi-notification">
  <div class="poi-icon" id="poi-icon">🏪</div>
  <h3 id="poi-name">スポット名</h3>
  <p id="poi-desc">説明文</p>
  <button onclick="closePOI()">✕ 閉じる</button>
</div>

<div id="goal-overlay">
  <div class="badge">🏅</div>
  <h2>完歩おめでとう！</h2>
  <p style="color:rgba(255,255,255,0.6);font-size:13px;margin-top:4px;">新宿コース 全行程完走</p>
  <div class="governor-msg">
    「○○さん、完歩ありがとうございます。<br>新宿の街を最後まで歩いてくださり、<br>本当に嬉しく思います。」<br><br>
    <span style="font-size:11px;color:rgba(255,255,255,0.4)">— 新宿区長より</span>
  </div>
  <button onclick="resetDemo()">もう一度歩く</button>
</div>

<script>
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1MTgwZmE2OS1kY2MxLTQzYzAtYWRkYi04YjQyNjdlNTI0YWIiLCJpZCI6NDE5MTQ4LCJpYXQiOjE3NzYzNDg1Nzl9.S7mIHSBM1iK6I17f0eNucf9xDUTlgyfvKr5JCq6ypwo';

const GOAL_STEPS = 200;
const MOVE_SPEED = 0.000012;
const START_LON = 139.6917;
const START_LAT = 35.6895;

const POI_SPOTS = [
  { steps: 40,  icon: '🏢', name: '東京都庁', desc: '東京のシンボル。高さ243mの展望台から都内を一望できます。' },
  { steps: 80,  icon: '🌸', name: '新宿御苑', desc: '明治時代から続く美しい庭園。桜の名所として全国に知られています。' },
  { steps: 120, icon: '🎎', name: '新宿歌舞伎町', desc: '日本最大級の繁華街。昼夜問わず多くの人が訪れます。' },
  { steps: 160, icon: '🍜', name: '思い出横丁', desc: '昭和の雰囲気が残る名所。絶品ラーメンやおでんが楽しめます。' },
];

let steps = 0, heading = 0;
let currentLon = START_LON, currentLat = START_LAT;
let viewer = null, sensorActive = false;
let lastStepTime = 0, accelHistory = [];
let triggeredPOIs = new Set(), goalReached = false;
let turnInterval = null, groundHeight = 40;

async function initCesium() {
  // リアルな地形
  const terrainProvider = await Cesium.createWorldTerrainAsync({ requestVertexNormals: true });

  viewer = new Cesium.Viewer('cesiumContainer', {
    terrainProvider,
    baseLayerPicker: false, geocoder: false, homeButton: false,
    sceneModePicker: false, navigationHelpButton: false,
    animation: false, timeline: false, fullscreenButton: false,
    vrButton: false, infoBox: false, selectionIndicator: false,
    shadows: true, shouldAnimate: true,
  });

  // 昼間の照明
  viewer.clock.currentTime = Cesium.JulianDate.fromIso8601('2024-04-01T10:00:00+09:00');
  viewer.scene.globe.enableLighting = true;

  // PLATEAUデータ（LOD2テクスチャ付き → フォールバックLOD1）
  document.getElementById('loading-text').textContent = 'PLATEAUデータを読み込み中...';
  let tilesetLoaded = false;

  const urls = [
    'https://assets.cms.plateau.reearth.io/assets/ad/52340f-3f7f-470e-918e-38eb9c27e2db/13104_shinjuku-ku_pref_2023_citygml_2_op_bldg_3dtiles_13104_shinjuku-ku_lod2/tileset.json',
    'https://plateau.geospatial.jp/main/data/3d-tiles/bldg/13100_tokyo/13104_shinjuku-ku/low_resolution/tileset.json',
  ];

  for (const url of urls) {
    if (tilesetLoaded) break;
    try {
      const tileset = await Cesium.Cesium3DTileset.fromUrl(url, { maximumScreenSpaceError: 8 });
      viewer.scene.primitives.add(tileset);
      tilesetLoaded = true;
      console.log('PLATEAU loaded:', url);
    } catch(e) {
      console.warn('Failed:', url);
    }
  }

  // 地形の高さを取得してカメラを正確に配置
  document.getElementById('loading-text').textContent = '位置を確認中...';
  try {
    const pos = [Cesium.Cartographic.fromDegrees(START_LON, START_LAT)];
    const updated = await Cesium.sampleTerrainMostDetailed(terrainProvider, pos);
    groundHeight = updated[0].height || 40;
  } catch(e) {
    groundHeight = 40;
  }

  updateCamera();
  document.getElementById('loading-overlay').style.display = 'none';
}

function updateCamera() {
  if (!viewer) return;
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(currentLon, currentLat, groundHeight + 1.7),
    orientation: {
      heading: Cesium.Math.toRadians(heading),
      pitch: 0.0,  // 完全に水平（地上から前を向く）
      roll: 0.0
    }
  });
}

async function requestPermission() {
  document.getElementById('permission-overlay').style.display = 'none';
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm === 'granted') startSensor();
    } catch(e) { startSensor(); }
  } else {
    startSensor();
  }
}

function startSensor() {
  sensorActive = true;
  window.addEventListener('devicemotion', handleMotion, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
}

function handleMotion(e) {
  if (!sensorActive || goalReached) return;
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const ax = acc.x||0, ay = acc.y||0, az = acc.z||0;
  const mag = Math.sqrt(ax*ax + ay*ay + az*az);
  accelHistory.push(mag);
  if (accelHistory.length > 10) accelHistory.shift();
  const avg = accelHistory.reduce((a,b)=>a+b,0)/accelHistory.length;
  const now = Date.now();
  if (Math.abs(mag-avg) > 2.5 && now - lastStepTime > 300) {
    lastStepTime = now;
    onStep();
  }
}

function handleOrientation(e) {
  if (!sensorActive) return;
  heading = e.webkitCompassHeading !== undefined ? e.webkitCompassHeading : (360 - (e.alpha||0));
  if (viewer) {
    viewer.camera.setView({
      destination: viewer.camera.position,
      orientation: { heading: Cesium.Math.toRadians(heading), pitch: 0, roll: 0 }
    });
  }
}

function onStep() {
  steps++;
  updateStats();
  flashStep();
  moveForward();
  checkPOI();
  if (steps >= GOAL_STEPS && !goalReached) setTimeout(showGoal, 500);
}

async function moveForward() {
  const rad = Cesium.Math.toRadians(heading);
  currentLon += Math.sin(rad) * MOVE_SPEED;
  currentLat += Math.cos(rad) * MOVE_SPEED;
  // 移動後の地形高さを取得
  try {
    const pos = [Cesium.Cartographic.fromDegrees(currentLon, currentLat)];
    const updated = await Cesium.sampleTerrainMostDetailed(viewer.terrainProvider, pos);
    groundHeight = updated[0].height || groundHeight;
  } catch(e) {}
  updateCamera();
}

function startTurn(dir) {
  stopTurn();
  turnInterval = setInterval(() => {
    heading += dir === 'left' ? -3 : 3;
    heading = ((heading%360)+360)%360;
    if (viewer) viewer.camera.setView({
      destination: viewer.camera.position,
      orientation: { heading: Cesium.Math.toRadians(heading), pitch: 0, roll: 0 }
    });
  }, 50);
}

function stopTurn() { if (turnInterval) { clearInterval(turnInterval); turnInterval = null; } }

function updateStats() {
  document.getElementById('step-count').textContent = steps;
  const d = steps * 0.75;
  document.getElementById('distance').textContent = d >= 1000 ? (d/1000).toFixed(1)+'km' : Math.round(d)+'m';
  document.getElementById('progress-text').textContent = Math.min(100, Math.round(steps/GOAL_STEPS*100))+'%';
}

function flashStep() {
  const el = document.getElementById('step-indicator');
  el.classList.add('active');
  setTimeout(()=>el.classList.remove('active'), 150);
}

function checkPOI() {
  for (const poi of POI_SPOTS) {
    if (!triggeredPOIs.has(poi.steps) && steps >= poi.steps) {
      triggeredPOIs.add(poi.steps); showPOI(poi); break;
    }
  }
}

function showPOI(poi) {
  document.getElementById('poi-icon').textContent = poi.icon;
  document.getElementById('poi-name').textContent = poi.name;
  document.getElementById('poi-desc').textContent = poi.desc;
  document.getElementById('poi-notification').style.display = 'block';
}

function closePOI() { document.getElementById('poi-notification').style.display = 'none'; }

function showGoal() {
  goalReached = true; sensorActive = false;
  document.getElementById('goal-overlay').style.display = 'flex';
}

function resetDemo() {
  steps = 0; heading = 0; currentLon = START_LON; currentLat = START_LAT;
  triggeredPOIs.clear(); goalReached = false; sensorActive = true;
  updateStats(); updateCamera();
  document.getElementById('goal-overlay').style.display = 'none';
}

window.addEventListener('load', () => {
  initCesium().catch(e => {
    console.error(e);
    document.getElementById('loading-overlay').style.display = 'none';
  });
});
</script>
</body>
</html>
